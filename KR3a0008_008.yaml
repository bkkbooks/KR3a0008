body:
  text: 義勇第八陳恆弒簡公而盟盟者皆完其家不盟者殺之石他人曰昔之事其君者皆得其君而事之今謂他人曰舍而君而事我他人不能雖然不盟則殺父母也從而盟是無君臣之禮也生於亂世不得正行劫於暴上不得道義故雖盟不以父母之死不如退而自殺以禮其君乃自殺陳恆弒君使勇士六人劫子淵棲子淵棲曰子之欲與我以我為知乎臣弒君非知也以我為仁乎見利而背君非仁也以我為勇乎劫我以兵懼而與子非勇也使吾無此三者與何補於子若吾有此三者終不從子矣乃舍之宋閔公臣長萬以勇力聞萬與魯戰師敗為魯所獲囚之宮中數月歸之宋與閔公博婦人在側公謂萬曰魯君孰與寡人美萬曰魯君美天下諸侯唯魯君耳宜其為君也閔公矜婦人妬因言曰爾魯之囚虜爾何知萬怒遂搏閔公頰齒落於口絶吭而死仇牧聞君死趍而至遇萬於門攜劍而叱之萬臂擊仇牧而殺之齒著於門闔仇牧可謂不畏強禦矣趍君之難顧不旋踵崔杼弒莊公令士大夫盟者皆脫劍而入言不疾指不至血者死所殺十人次及晏子晏子奉杯血仰天歎曰惡乎崔子將為無道殺其君盟者皆視之崔杼謂晏子曰子與我我與子分國子不吾與吾將殺子直兵將推之曲兵將勾之唯子圖之晏子曰嬰聞回以利而背其君者非仁也劫以刃而失其志者非勇也詩云愷悌君子求福不回嬰可謂不回矣直兵推之曲兵鉤之嬰不之回也崔子舍之晏子趍出授綏而垂其僕將馳晏子拊其手曰虎豹在山林其命在庖廚馳不益生緩不益死按之成節然後去之詩云彼己之子舍命不渝晏子之謂也佛肸以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫皆從之至於田卑曰義死不避斧鉞之罪義窮不受軒冕之服無義而生不仁而富不如烹褰衣將就鼎佛肸脫屨而生之趙氏聞其叛也攻而取之聞田卑不肯與也求而賞之田卑曰不可也一人舉而萬夫俯首智者不為也賞一人以慚萬夫義者不取也我受賞使中牟之士懷恥不義辭賞從處曰以行臨人不道吾去矣遂南之楚楚太子建以費無極之譖見逐建有子曰勝在外子西召勝使治白號曰白公勝怨楚逐其父將弒惠王及子西欲得易甲陳士勒兵以示易甲曰與我無患不富貴不吾與則此是也易甲笑曰嘗言吾義矣吾子忘之乎立得天下不義吾不取也威吾以兵不義吾不從也今子將弒子之君而使我從子非吾前義也子雖告我以利威我以兵吾不忍為也子行子之威則吾亦得明吾義也逆子以兵爭也應子以聲鄙也吾聞士立義不爭行死不鄙拱而待兵顏色不變也白公勝將弒楚惠王王出亡令尹司馬皆死拔劍而屬之於屈廬曰子與我將舍子子不與我必殺子廬曰子殺叔父而求福於廬也可乎吾聞知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂人臣之禮故上知天命下知臣道其有可劫乎子胡不推之白公勝乃內其劍白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫之以刃王子閭曰王孫輔相楚國匡正王室而后自庇焉閭之願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公勝曰楚國之重天下無有天以與子子何不受也王子閭曰吾聞辭天下者非輕其利也以明其德也不為諸侯者非惡其位也以潔其行也今吾見國而忘主不仁也劫白刃而失義不勇也子雖告我以利威我以兵吾不為也白公強之不可遂殺之葉公高率衆誅白公而反惠王於國白公之難楚人有莊善者辭其母將往死之其母曰棄其親而死其君可謂義乎莊善曰吾聞事君者內其祿而外其身今所以養母者君之祿也身安得無死乎遂辭而行比至公門三廢車中其僕曰子懼矣曰懼既懼何不返莊善曰懼者吾私也死義吾公也聞君子不以私害公及公門刎頸而死君子曰好義乎哉齊崔杼弒莊公也有陳不占者聞君難將赴之比去餐則失匕上車失軾御者曰怯如是去有益乎不占曰死君義也無勇私也不以私害公遂往聞戰鬭之聲恐駭而死人曰不占可謂仁者之勇也知伯囂之時有士曰長兒子魚絶知伯而去之三年將東之越而道聞知伯囂之見殺也謂御曰還車反吾將死之御曰夫子絶知伯而去之三年矣今反死之是絶屬無別也長兒子魚曰不然吾聞仁者無餘愛忠臣無餘祿吾聞知伯之死而動吾心餘祿之加於我者至今尚存吾將往依之反而死衛懿公有臣曰弘演遠使未還狄人攻衛其民曰君之所與祿位者鶴也所富者宮人也君使宮人與鶴戰余焉能戰遂潰而去狄人追及懿公於滎澤殺之盡食其肉獨舍其肝弘演至報使於肝畢呼天而號盡哀而止曰臣請為表因自刺其腹內懿公之肝而死齊桓公聞之曰衛之亡也以無道今有臣若此不可不存於是救衛於楚丘芋尹文者荊之驅鹿彘者也司馬子期獵於雲夢載旗之長拖地芋尹文拔劍齊諸軫而斷之二車抽弓於韔援矢於筒引而未發也司馬子期伏軾而問曰吾有罪於夫子乎對曰臣以君旗拽地故也國君之旗齊於軫大夫之旗齊於軾今子荊國有名大夫而滅三等文之斷也不亦可乎子期悅載之王所王曰吾聞有斷子之旗者其人安在吾將殺之子期以文之言告王悅使文為江南令而大治卞莊子好勇養母戰而三北交遊非之國君辱之及母死三年冬與魯戰卞莊子請從見於魯將軍曰初與母處是以三北今母死請塞責而神有所歸遂赴敵獲一甲首而獻之曰此塞一北又入獲一甲首而獻之曰此塞再北又入獲一甲首而獻之曰此塞三北將軍曰毋沒爾家宜止之請為兄弟莊子曰三北以養母也是子道也今士節小具而塞責矣吾聞之節士不以辱生遂反敵殺十人而死君子曰三北又塞責滅世斷家於孝不終也
