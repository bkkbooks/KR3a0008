front:
  text: 新序佚文輯齊王問墨子曰古之學者為己今之學者為人何如對曰古之學者得一善言以附其身今之學者得一善言務以悅人北堂書鈔八十三太平御覽六百七李斯問荀卿曰當今之時為秦奈何孫卿曰力術止義術行秦之謂也荀子強國篇楊倞注引子産決鄧析教民之難約大獄袍衣小獄襦褲民之獻袍衣襦褲者不可勝數以非為是以是為非鄭國大亂民口歡譁子産患之於是討鄧析而僇之民乃服是非乃定荀子正名篇注引梁車新為鄴令其姊往見之值暮廓門閉遂踰廓而入梁車新因刖其足趙成侯以為不慈遂奪璽免官御覽五百十七魯哀公為室而大公儀子諫曰室大衆與人處則譁少與人處則悲願公適也曰聞命矣築室不輟明日又諫國小室大百姓必怨吾君諸侯聞之必輕吾國公曰聞命矣築室不輟明日又諫曰左昭右穆為室而大以臨二先君無乃害於孝乎於是哀公毀室而止御覽百七十四齊景公遊於牛山之上而北望齊曰美哉國乎使古無死者則寡人將去斯如之何乃泣沾襟高子曰然賴君之賜蔬食惡肉可得而食也駑馬棧車可得而乘也且不欲死而況吾君乎俯而垂泣晏子拊手而笑曰樂哉今日嬰之遊也見怯君一而諛臣二使古之無死者則太公丁公至今猶存吾君方為被蓑笠而立乎畎畝之中唯事之恤何暇念死乎景公慚焉御覽四百二十八周昌者沛人以軍功封汾陰侯御史大夫高帝欲廢惠帝立戚夫人子如意群臣固爭莫能得昌廷爭之強上問其說昌為人吃曰臣口不能言臣則知其不可也陛下欲廢太子臣期期不奉詔御覽七百四十齊有田巴先生者行修於內智明於外王聞其賢聘之將問政焉田巴先生改製新衣拂飾冠帶顧謂其妾妾曰姣將出門問其從者從者曰姣過於淄水自照視醜惡甚焉遂見齊王齊王問政對曰政在正身正身之本在於群臣大王召臣臣改制鬋飾問於臣妾曰奚若妾愛臣諛臣曰姣問從者從者畏臣諛臣曰姣臣據臨淄水而觀影然後自知醜惡也今齊之臣妾諛王者非特二人王如臨淄水見己之惡過而自改斯齊國治矣御覽六十三又三百八十二孔子見宋榮啓期老白首衣弊服鼓琴自樂孔子問曰先生老而窮何樂也啓期曰吾有三樂天生萬物以人為貴吾得為人一樂也人生以男為貴吾得為男二樂也人生命有傷夭吾年九十歲是三樂也貧者士之常死者人之終居常以守終何不樂乎御覽三百八十三崔杼弒莊公申蒯漁於海而後至將入死之其御止之曰君之無道聞於天下不可死也申蒯曰告我晚吾安得食亂君之祿而死治君之事乎子免之無死其御曰子有亂主猶死之我有治長奈何勿死申蒯至門曰申蒯聞君死請入吊門者以告崔杼杼令勿內申蒯曰汝疑我乎吾與汝臂乃斷其左臂以與門者門者以示崔杼杼陳八列令其入申蒯拔劍呼天三踊乃鬭殺七列未及崔子一列而死其御亦死之門外君子聞之曰蒯可謂守節死義矣御覽三百六十九又四百十七又四百三十八昔子奇年十八齊君使之治阿既行矣悔之使使追之曰未至阿及之還之已至勿還也使者及之而不還君問其故對曰臣見使與共載者白首也夫以老者之智以少者之決必能治阿矣是以不還御覽二百六十八齊景公遊海上樂之六月不歸令左右敢言歸者死顏歜諫曰君樂治海上不樂治國儻有治國者君且安得樂出海也公據戟將斫之歜撫衣而待之曰君奚不斫也昔桀殺關龍逄紂殺王子比干君奚不斫以臣參此二人不亦可乎公遂歸御覽三百五十三昌邑王治側鑄冠十枚以冠賜師友儒者後以冠冠奴龔遂免冠歸之曰王賜儒者冠下至臣今以餘冠冠奴是大王奴虜畜臣也御覽五百昌邑王徵為天子到營陽置積竹刺杖二枚龔遂諫曰積竹刺杖者驕蹇少年杖也大王奉大喪當柱竹杖御覽七百十昌邑王取侯王二千石墨綬黃綬與左右佩之龔遂諫曰高皇帝造花綬五等陛下取之而與賤人臣以為不可願陛下收之御覽六百八十二上古之時其民敦朴故三皇教而不誅無師而威故善為者不師三皇之德也至於五帝有師旅之備而無用故善師者不陳五帝之謂也湯伐桀文王伐崇武王伐紂皆陳而不戰故善陳者不戰三王之謂也及夏后氏之伐有扈殷高宗之討鬼方周宣王之征熏鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服而彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三存亡一繼絶九合諸侯一匡天下衣裳之會十有一嘗大戰亦不血刃至晉文公設虎皮之威陳曳柴之僞以破楚師而安中國故曰善戰者不死晉文公之謂也楚昭王遭闔閭之禍國滅昭王出亡父老迎而哭之昭王曰寡人不仁不能守社稷父老反矣何憂無君寡人且從此入海矣父老曰有君若此其賢也及申包胥請救哭秦庭七日秦君憐而救之秦楚同心遂走吳師昭王反國故善死者不亡昭王之謂也是故自晉文公已下至戰國而暴兵始衆於是以彊并弱以大吞小故彊國務攻弱國備守合從連衡群相征伐故戰則稱孫吳守則稱墨翟至秦而以兵并天下窮兵極武而亡及項羽尚暴而滅漢以寬仁而興故能掃除秦之苛暴矣孝武皇帝攘服四夷其後天下安然故世之為兵者其行事略可覩也御覽二百七十一湯居亳七十里地與葛伯為鄰葛伯放淫不祀湯使人遺之牛羊葛伯食之又不以祀湯又使人問曰何為不祀曰無以供粢盛也湯又使亳衆往為之耕老弱饋食葛伯率其民要其有酒食黍稻者奪之不與者殺之有一童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也為其殺是童子而征之四海之內皆曰非富天下也為匹夫匹婦復讎也御覽三百五公孫敖問伯象先生曰今先生收天下之術博觀四方之日久矣未能裨世主之治明君臣之義是則未有異於府庫之藏金筐篋之囊簡書也御覽八百十一公孫敖曰夫玉石金鐵猶可琢磨以為器用而況於人御覽八百十三紂王天下熊羹不熟而殺庖人御覽八百六十一楚王使謁者徐光迎方與盲人吹竽者也龔遂乃去御覽五百八十一禹南濟於江黃龍負舟舟中之人皆失色禹仰天而歎曰吾受命於天死生命也龍俯首而逝御覽六十勇士一呼三軍皆辟易士之誠也夫勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動天至其死矣頭身斷絶夫不用仁而用武當時雖快身必無後是以孔子勤勤行仁御覽四百三十七齊遣淳于髡到楚髡為人短小楚王甚薄之謂曰齊無人耶而使子來子何長也對曰臣無所長腰中七尺之劍欲斬無狀王王曰止吾但戲子耳與髡共飲御覽四百三十七秦王以五百里地易鄢陵鄢陵君辭不受使唐且謝秦王王忿然變色怒曰亦向見天子之怒乎且曰臣未嘗見王曰夫天子之怒伏尸百萬流血千里且曰大王亦嘗見布衣韋帶士之怒乎王曰布衣韋帶士之怒解冠徒跣以頭搶地耳何難知者且曰此乃庸夫庶人之怒耳非布衣韋帶士之怒也夫專諸刺王僚彗星襲日奔星晝出要離刺王子慶忌倉鷹擊於臺上聶政刺韓王白虹貫日此三者皆布衣怒也與臣將四士無怒則已一怒伏尸二人流血五步即案其匕首起視秦王曰今將是矣王色變跪曰先生就坐寡人喻矣鄢陵獨以五十里在者徒用先生故乎御覽四百三十七林既衣韋衣而朝齊景公景公曰此君子之服耶小人之服耶林既作色曰夫服事何足以揣士行乎昔荊為長劍危冠令尹子西出焉齊桓短衣而遂之溝冠管仲隰朋出焉越文身翦髮范蠡大夫種亦出焉西戎左衽而椎結由余亦出焉如君言衣犬裘者當犬號衣羊裘者當呼鳴今君衣狐裘而朝得無為變乎景公曰子自以為勇悍乎曰登高臨危而目不眴而足不凌者此工匠之勇悍也入深泉取蛟龍拘黿而出者此漁夫之勇悍也入深山刺虎豹抱熊而出者此獵夫之勇悍也夫不難斷頭裂腹暴骨流血中野者此武士之勇悍也今臣居廣廷作色而辨以犯主君之怒前雖有乘軒之賞未為之動也後雖有斧鑕之威未為之恐也此既之所以為勇悍也御覽四百三十七文王之葬枯骨無益衆庶衆庶悅之恩義動人也御覽三百七十五挾泰山以超北海御覽三十九諸侯牆有黑堊之色無丹青之彩御覽一百八十七賤之如虺豕荀子王霸篇楊倞注伊尹蒙恥辱負鼎俎以干湯後漢書崔駰傳注營度也文選東京賦注引楚王載繁弱之弓忘歸之矢以射兕於雲夢文選嵇叔夜贈秀才入軍詩注引公孫龍謂平原君曰臣居魯則聞下風高先生之知悅先生之行文選鄒陽上書吳王注引孔子曰聖人雖生異世相襲若規矩文選孫子荊為石仲容與孫皓書注引趙良謂商君曰君亡可翹足而待也文選陳孔璋檄吳將校部曲文注引大王亶父止於岐下百姓扶老攜幼隨而歸之一年成邑二年成都三年五倍其初文選于令升晉紀總論注引及定王王室遂卑矣文選陸士衡辨亡論上注引晉襄公之孫周為晉國休戚不倍本也文選潘安仁楊仲武誄注引臧孫行猛政子贛非之臧孫召子贛而問曰我不法耶曰法矣我不廉耶曰廉矣我不能事耶曰能事矣臧孫曰三者吾唯恐不能今盡能之子尚何非邪子貢曰子法矣好以害人子廉矣好以驕上子能事矣好以陵下夫政者猶張琴瑟也大絃急則小絃絶矣是以位尊者德不可以薄官大者治不可以小地廣者制不可以狹民衆者法不可以苛天性然也故曰罰得則姦邪止矣賞得則下歡悅矣由此觀之子則賊心已見矣獨不聞夫子産之相鄭乎其論材推賢舉能也抑惡而揚善故有大略者不問其所短有德厚者不問其小疵有大功者宿惡滅息成人之美不成人之惡也其牧民之道養之以仁教之以禮使之以義修法練教必遵民所樂故從其所便而處之因其所欲而與之順其所好而勸之賞之疑者從重罰之疑者從輕其罰審其賞明其刑省其德純其治約而教化行矣治鄭七年而風俗和平災害不生國無刑人囹圄空虛及死國人聞之皆叩心流涕曰子産已死吾將安歸夫使子産命可易吾不愛家一人其生也則見愛其死也而可悲仕者哭於廷商人哭於市農人哭於野處女哭於室良人絶琴瑟大夫解佩玦婦人脫簪珥皆巷哭然則思者仁恕之道也君子之治始於不足見而終於不可及此之謂也蓋德厚者報美怨大者禍深故曰德莫大於仁而禍莫大於刻夫善不可以為求而惡不可以亂去今子方病民喜而相賀曰臧孫子已病幸其將死子之病少愈而民以相懼曰臧孫子病又愈矣何吾命之不幸也臧孫子又不死矣子之病也人以相喜生也人以相駭子之賊心亦甚深矣為政若此如之何不非也於是臧孫子慚焉退而避位群書治要趙簡子欲專天下謂其相曰趙有犢犨晉有鐸鳴魯有孔丘吾殺三人者天下可王也於是乃召犢犨鐸鳴而問政焉已而殺之使使者聘孔子於魯以胖牛肉迎於河上使者語船人曰孔子即上船中河必流而殺之孔子至使者致命進胖牛之肉孔子仰天而歎曰美哉水乎洋洋乎使丘不濟此水者命也夫子路趨而進曰何謂也孔子曰夫犢犨鐸鳴晉國之賢大夫也趙簡子未得意之時須而後從政及其得意也殺之黃龍不返於涸澤鳳凰不離其罻羅故刳胎焚林則麒麟不臻覆巢破卵則鳳凰不翔竭澤而漁則龜龍不見鳥獸之於不仁猶知避之況丘乎故虎嘯而谷風起龍興而景雲見擊庭鍾於外而黃鍾應於內夫物類之相感精神之相應若響之應聲影之象形故君子違傷其類者今彼已殺吾類矣何為之此乎於是遂回車不渡而還三國志劉廙傳注子奇年十六齊君使治阿既而君悔之遣使追追者反曰子奇必能治阿共載皆白首也夫以老者之智以少者決之必能治阿矣子奇至阿鑄兵以作耕器出倉廩以帳貧窮阿縣大治魏聞童子治邑庫無兵倉無粟乃起兵擊之阿人父率子兄率弟以私兵戰遂敗魏師意林孟子見齊宣王於雪宮王左右顧曰賢者亦有此樂耶孟子對曰有人不得則非其上矣不得而非其上者非也為人之上者而不與民同樂者亦非也樂民之樂者人亦樂其樂憂人之憂者民亦憂其憂樂以天下憂以天下然而不王者未之有也群書治要子路治蒲三年孔子過之入其境曰善哉由乎恭敬以信矣入其邑曰善哉由乎忠信以寬矣至於其廷曰善哉由乎明察以斷矣子貢執轡而問曰夫子未見由而三稱其善可得聞乎孔子曰我入其境田疇盡易草萊甚闢溝洫甚深此其恭敬以信故其民盡力也入其邑牆屋甚崇樹木甚茂此忠信以寬故其民不偷也入其廷廷甚間此明察以斷故其民不擾也群書治要申子之書言人主當執術無刑因循以督責臣下其責深刻故號曰術商鞅所為書號曰法皆曰刑名故號曰刑名法術之書史記韓非傳集解秦孝公保崤函之固以廣雍州之地東并河西北收上郡國富兵強長雄諸侯周室歸藉四方來賀為戰國霸君秦遂以強六世而并諸侯亦皆商君之謀也夫商君極力無二慮盡公不顧私使民內急耕織之業以富國外重戰伐之賞以勸戎士法令必行內不阿貴寵外不偏疏遠是以令行而禁止法出而姦息故雖書云無偏無黨詩云周道如砥其直如矢司馬法之勵戎士周后稷之勸農業無以易此此所以并諸侯也故孫卿曰四世有勝非幸也數也然無信諸侯畏而不親夫霸君若齊桓晉文者桓不背柯之盟文不負原之期而諸侯畏其強而親信之存亡繼絶四方歸之此管仲舅犯之謀也今商君倍公子卬之舊恩棄交魏之明信詐取三軍之衆故諸侯畏其強而不親信也藉使孝公遇齊桓晉文得諸侯之統將合諸侯之君驅天下之兵以伐秦秦則亡矣天下無桓文之君故秦得以兼諸侯衛鞅始自以為知霸王之德原其事不諭也昔周召施善政及其死也後世思之蔽芾甘棠之詩是也嘗舍於樹下後世思其德不忍伐其樹況害其身乎管仲奪伯氏邑三百戶無怨言今衛鞅內刻刀鋸之刑外深鈇鉞之誅步過六尺者有罰棄灰於道者被刑一日臨渭而論囚七百餘人渭水盡赤號哭之聲動於天地畜怨積讎比於邱山所逃莫之隱所歸莫之容身死車裂滅族無姓其去霸王之佐亦遠矣然惠王殺之亦非也可輔而用也使衛鞅施寬平之法加之以恩申之以信庶幾霸者之佐哉史記商君傳集解斯在逐中道上上諫書達始皇始皇使人逐至驪邑得還史記李斯傳集解孔子謂曾子曰君子不以利害義則恥辱安從生哉官怠於宦成病加於少愈禍生於怠惰孝衰於妻子察此四者慎終如始薛據孔子集語齊桓公好婦人之色妻姑姊妹國人多淫於骨肉馬驌繹史四十四之二農無廢業野無空地北堂書鈔卷三十九引梁伯湎於酒淫於色心惛而耳塞好作大城而不居民罷甚御覽一百九十二引單襄公曰經之以天緯之以地經緯不爽天之象也文選魏都賦注引
