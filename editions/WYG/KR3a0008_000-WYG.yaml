  text: 欽定四庫全書子部一
  hash: sha256:0cca43e587e9c707aa7b5087f084e976ac80456101f009f4c0e78ad8fcc2f097
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0008_WYG_000-1a, image: WYG0696/WYG0696-0187a.png}
body:
  text: 新序儒家類提要臣等謹案新序十卷漢劉向撰向字子政初名更生以父任為輦郎歴官中壘校尉事蹟具漢書本傳案班固漢書藝文志稱向所序六十七篇新序說苑世說列女傳頌圖也隋書經籍志新序三十卷録一卷唐書藝文志亦同曽鞏校書序則云今可見者十篇鞏與歐陽修同時而所言巻帙懸殊葢修志皆據唐時全本為言鞏所校録則宋初殘闕之本也晁公武謂曽子固綴輯散逸新序始復全者誤矣此本雜事五卷刺奢一卷節士二卷善謀二卷即曽鞏校定之舊崇文總目云所載皆戰國秦漢間事以今考之春秋時事尤多漢事不過數條大抵採百家傳記以類相從故頗與春秋内外傳戰國䇿太史公書互相出入髙似孫子畧謂先秦古書甫脫燼刼一入向筆采擷不遺至其正紀綱廸教化辨邪正黜異端以為漢規監者盡在此書其言雖推崇已甚要其推明古訓以衷之於道徳仁義在諸子中猶不失為儒者之言也葉大慶考古質疑摘其昭奚恤對秦使者一條所稱司馬子反在奚恤前二百二十年葉公子髙令尹子西在奚恤前一百三十年均非同時之人又摘其誤以孟子論好色好勇為對梁恵王皆切中其失至大慶謂黍離乃周詩新序誤云衛宣公之子夀閔其兄且見害而作則殊不然向本學魯詩而大慶以毛詩繩之其不合也固宜是則未考漢儒專門授受之學矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書
  hash: sha256:bf4a9dfd3dda5acbbaaa4a66fdb3edcce45441915dae065fa4cfdc948bf2eec2
