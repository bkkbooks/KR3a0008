body:
  text: 卷第一雜事一卷第二雜事二卷第三雜事三卷第四雜事四卷第五雜事五卷第六剌奢卷第七節士上卷第八節士下卷第九善謀上卷第十善謀下古之治天下者一道徳同風俗蓋九州之廣萬民之衆千歳之遠其教旣明其政旣成之後所守者一道所傳者一説而己故詩書之文歷世數十作者非一而言未甞不相爲終始化之如此其至也當是之時異行者有誅異言者有禁防之又如此其備也故二帝三王之際及其中間甞更衰亂而餘澤未熄之時百家衆説未有能岀其間者也及周之末世先王之教化法度旣廢餘澤旣熄世之治方術者蓋得其一偏故人奮其私意家尚其私學者蠭起於中國皆明其所長而昧其所短務其所得而諱其所失天下之士各自爲言而不能相通世人之不復知夫學之有統道之有歸也先王之遺文雖在皆絀而不講况至於秦爲世所大禁哉漢興六藝皆得於散絶殘脱之餘世復無明先王之道爲衆説之所蔽闇而不明鬰而不發而怪竒可喜之論各師異見皆自名家者誕漫於中國一切不異於周之末世其弊至於今尚在也自斯以來天下學者知折􅇆於聖人而能純於道徳之羙者楊雄氏而止耳如向之徒皆不免爲衆説之蔽而不知有折􅇆者也孟子曰待文王而後興者凡民也豪傑之士雖無文王猶興漢之士豈特無明先王之道以一之者哉亦其岀於是時者豪傑之士少故不能特起於流俗之中絶學之後也蓋向之序此書於今最爲近古雖不能無失然逺至舜禹而次及於周秦以來古人之嘉言善行亦徃徃而在也要在愼取之而巳故臣旣惜其不可見者而校其可見者特詳焉亦足以知臣之志者豈好辯哉蓋臣之不得已也編校書籍臣曽鞏上
